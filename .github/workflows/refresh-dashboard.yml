name: Refresh Dashboard

on:
  schedule:
    # Every hour
    - cron: "15 * * * *"
  workflow_dispatch:
  # Also run right after token refresh
  workflow_run:
    workflows: ["Refresh Apple Search Ads Token"]
    types: [completed]

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run dashboard refresher
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
          REVENUECAT_PROJECT_ID: ${{ secrets.REVENUECAT_PROJECT_ID }}
          ASA_ORG_ID: ${{ secrets.ASA_ORG_ID }}
        run: python3 refresh_dashboard.py
