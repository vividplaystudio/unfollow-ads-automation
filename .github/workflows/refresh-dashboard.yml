name: Refresh Dashboard

on:
  # No standalone schedule — the token refresh runs every hour and
  # successful runs trigger this workflow via workflow_run, so the dashboard
  # always refreshes against a fresh token. Adding a schedule here used to
  # fire while the previous token was already expired, producing failure
  # emails that recovered automatically a minute later.
  workflow_dispatch:
  workflow_run:
    workflows: ["Refresh Apple Search Ads Token"]
    types: [completed]

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run dashboard refresher (JSON + FTP)
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
          REVENUECAT_PROJECT_ID: ${{ secrets.REVENUECAT_PROJECT_ID }}
          ASA_ORG_ID: ${{ secrets.ASA_ORG_ID }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_PATH: ${{ secrets.FTP_PATH }}
          RC_WEBHOOK_SECRET: ${{ secrets.RC_WEBHOOK_SECRET }}
        run: python3 refresh_dashboard_json.py

      - name: Run Meta Ads refresher (JSON + FTP)
        if: always()
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_PATH: ${{ secrets.FTP_PATH }}
        run: python3 refresh_meta_ads.py
