name: Install cPanel cron setup

# One-shot installer that uploads the Python pullers + a config.sh
# (filled in from GitHub Secrets) to /home/coinvohy/unfollow-ads/ on
# the cPanel host. After this runs, the user only needs to add cron
# jobs in cPanel UI to switch from GitHub Actions → cPanel cron.

on:
  workflow_dispatch:
    inputs:
      target_dir:
        description: "Absolute path on the cPanel host where scripts will live"
        default: "/home/coinvohy/unfollow-ads"
      dashboard_dir:
        description: "Where the JSON files should land (LOCAL_OUTPUT_DIR)"
        default: "/home/coinvohy/genivox.com/ads-upload"

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload scripts + generate config.sh on cPanel
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          # Comma-separated list of every ad account under the same Meta BM.
          # Optional — if unset the default in the install script hardcodes both.
          META_AD_ACCOUNT_IDS: ${{ secrets.META_AD_ACCOUNT_IDS }}
          ADJUST_API_TOKEN: ${{ secrets.ADJUST_API_TOKEN }}
          ADJUST_APP_TOKEN: ${{ secrets.ADJUST_APP_TOKEN }}
          REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
          REVENUECAT_PROJECT_ID: ${{ secrets.REVENUECAT_PROJECT_ID }}
          RC_WEBHOOK_SECRET: ${{ secrets.RC_WEBHOOK_SECRET }}
          TARGET_DIR: ${{ inputs.target_dir }}
          DASHBOARD_DIR: ${{ inputs.dashboard_dir }}
        run: |
          python3 << 'PYEOF'
          import ftplib, ssl, os, io

          host = os.environ["FTP_HOST"]
          user = os.environ["FTP_USER"]
          pw = os.environ["FTP_PASS"]
          target_dir = os.environ["TARGET_DIR"]
          dashboard_dir = os.environ["DASHBOARD_DIR"]

          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE

          ftp = ftplib.FTP_TLS(host, timeout=60, context=ctx)
          ftp.login(user, pw)
          ftp.prot_p()
          print(f"FTP user root:   {ftp.pwd()}")
          print("Top-level contents:")
          ftp.dir()
          print()

          # FTP user is chroot'd. Try the absolute path first; if it fails
          # with "no such directory", strip a common chroot prefix and
          # treat the path as relative to FTP root.
          def try_navigate(path):
              parts = path.strip("/").split("/")
              ftp.cwd("/")
              for p in parts[:-1]:
                  ftp.cwd(p)
              try:
                  ftp.cwd(parts[-1])
              except ftplib.error_perm:
                  ftp.mkd(parts[-1])
                  ftp.cwd(parts[-1])

          try:
              try_navigate(target_dir)
              print(f"  Working dir (absolute): {ftp.pwd()}")
          except ftplib.error_perm:
              # Strip "/home/<user>" prefix — FTP root is already the home
              import re
              stripped = re.sub(r"^/home/[^/]+", "", target_dir) or "/"
              if stripped != target_dir:
                  print(f"  Absolute path failed (chroot). Trying {stripped} relative to FTP root…")
                  try_navigate(stripped)
                  print(f"  Working dir (chroot): {ftp.pwd()}")
              else:
                  raise

          # Upload script files (binary mode to preserve line endings)
          for fname in ["refresh_meta_ads.py", "refresh_adjust.py",
                        "refresh_dashboard_json.py",
                        "refresh_daily_rc_fast.py"]:
              with open(fname, "rb") as f:
                  ftp.storbinary(f"STOR {fname}", f)
                  print(f"  ✅ uploaded {fname}")

          # run.sh from cpanel/ subfolder
          with open("cpanel/run.sh", "rb") as f:
              ftp.storbinary("STOR run.sh", f)
              print("  ✅ uploaded run.sh")
          # Make run.sh executable
          try:
              ftp.sendcmd("SITE CHMOD 755 run.sh")
              print("    chmod 755 run.sh")
          except Exception as e:
              print(f"    (chmod skipped: {e})")

          # Build config.sh from secrets and upload
          config = (
              "#!/bin/bash\n"
              "# Generated by install-cpanel.yml — do not edit by hand.\n"
              f'export LOCAL_OUTPUT_DIR="{dashboard_dir}"\n'
              "\n# Meta\n"
              f'export META_ACCESS_TOKEN="{os.environ["META_ACCESS_TOKEN"]}"\n'
              # Comma-separated list of ad account IDs. Both accounts live under
              # the same Business Manager, so the single META_ACCESS_TOKEN works
              # for all of them. The refresh script splits this and pulls each
              # account independently, tagging every row with its `account_id`.
              f'export META_AD_ACCOUNT_IDS="{os.environ.get("META_AD_ACCOUNT_IDS","2399779997191076,1306431168140247")}"\n'
              # Kept for backward compat with any script that still reads the
              # singular name — points at the primary account.
              f'export META_AD_ACCOUNT_ID="{os.environ.get("META_AD_ACCOUNT_ID","2399779997191076")}"\n'
              "\n# Adjust\n"
              f'export ADJUST_API_TOKEN="{os.environ["ADJUST_API_TOKEN"]}"\n'
              f'export ADJUST_APP_TOKEN="{os.environ.get("ADJUST_APP_TOKEN","pbu6v5dz9yww")}"\n'
              "\n# RevenueCat\n"
              f'export REVENUECAT_API_KEY="{os.environ["REVENUECAT_API_KEY"]}"\n'
              f'export REVENUECAT_PROJECT_ID="{os.environ.get("REVENUECAT_PROJECT_ID","6afc72a9")}"\n'
              f'export RC_WEBHOOK_SECRET="{os.environ.get("RC_WEBHOOK_SECRET","")}"\n'
              'export RC_EVENTS_URL="https://genivox.com/ads-upload/rc_events.php"\n'
          )
          ftp.storbinary("STOR config.sh", io.BytesIO(config.encode("utf-8")))
          print("  ✅ uploaded config.sh")
          try:
              ftp.sendcmd("SITE CHMOD 600 config.sh")
              print("    chmod 600 config.sh (owner read/write only)")
          except Exception as e:
              print(f"    (chmod skipped: {e})")

          # Defense in depth: deny ALL web access to this folder so even if
          # someone bypasses the dashboard basic auth, they can't read the
          # API tokens in config.sh. Apache 2.4 syntax.
          htaccess = (
              "# Block ALL web access — this folder contains API tokens.\n"
              "# Scripts here are run by cron, never served by Apache.\n"
              "<RequireAll>\n"
              "    Require all denied\n"
              "</RequireAll>\n"
              "# Fallback for Apache 2.2 (in case the host runs it)\n"
              "Order Deny,Allow\n"
              "Deny from all\n"
          )
          ftp.storbinary("STOR .htaccess", io.BytesIO(htaccess.encode("utf-8")))
          print("  ✅ uploaded .htaccess (denies all web access)")

          print(f"\nFinal listing of {ftp.pwd()}:")
          ftp.dir()
          ftp.quit()
          print("\n✅ Install complete. Next: add cron jobs in cPanel.")
          PYEOF
