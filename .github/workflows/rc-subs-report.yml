name: RC Subs-by-day Report

# One-shot report that walks every RevenueCat customer and prints daily
# new signups + cancellations by tier. Runs on-demand only.
#
# Output is the workflow log — copy/paste the CSV block into a spreadsheet.

on:
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run RC subs-by-day report
        env:
          REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
          REVENUECAT_PROJECT_ID: ${{ secrets.REVENUECAT_PROJECT_ID }}
        run: python3 -u report_rc_subs_by_day.py
