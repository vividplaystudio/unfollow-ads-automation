name: Probe RC metrics endpoints

# One-shot: query several candidate RC v2 API endpoints to find one that
# returns per-day revenue data matching RC UI. Prints the response so we
# can pick whichever works. Manually triggered.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe candidate endpoints
        env:
          REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
          REVENUECAT_PROJECT_ID: ${{ secrets.REVENUECAT_PROJECT_ID }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, urllib.error

          api_key = os.environ["REVENUECAT_API_KEY"]
          project_id = os.environ.get("REVENUECAT_PROJECT_ID", "6afc72a9")

          # Probe a few documented + commonly-known v2 paths. We're looking
          # for anything that returns a daily revenue time series.
          candidates = [
              # v2 metrics — common patterns
              f"/v2/projects/{project_id}/metrics/overview",
              f"/v2/projects/{project_id}/metrics",
              f"/v2/projects/{project_id}/metrics/revenue",
              f"/v2/projects/{project_id}/metrics/charts/revenue",
              # Charts
              f"/v2/projects/{project_id}/charts",
              f"/v2/projects/{project_id}/charts/revenue",
              # Reports
              f"/v2/projects/{project_id}/reports/revenue",
              # Dashboard
              f"/v2/projects/{project_id}/dashboard/revenue",
              # Legacy v1 patterns (also worth trying)
              f"/v1/projects/{project_id}/metrics",
              f"/v1/projects/{project_id}/charts/overview",
              # Subscribers
              f"/v2/projects/{project_id}/subscribers",
              # The /v2/projects/{id} root often lists capabilities
              f"/v2/projects/{project_id}",
          ]

          # Query string variants to test (in case the endpoint needs them)
          variants = ["", "?start_date=2026-05-25&end_date=2026-06-23"]

          for path in candidates:
              for q in variants:
                  url = "https://api.revenuecat.com" + path + q
                  req = urllib.request.Request(
                      url,
                      headers={"Authorization": f"Bearer {api_key}", "Accept": "application/json"},
                  )
                  try:
                      with urllib.request.urlopen(req, timeout=15) as r:
                          body = r.read().decode("utf-8", errors="replace")
                          print(f"\n✅ {r.status} {path}{q}")
                          # Print first 600 chars so log isn't huge but we
                          # see whether daily revenue is in there.
                          print(f"   {body[:600]}")
                  except urllib.error.HTTPError as e:
                      body = ""
                      try:
                          body = e.read(200).decode("utf-8", errors="replace")
                      except Exception:
                          pass
                      print(f"❌ {e.code} {path}{q}: {body[:150]}")
                  except Exception as e:
                      print(f"❌ ERR {path}{q}: {type(e).__name__} {e}")
                  # Stop trying variants once we get a 200 — the path works.
                  if 'body' in dir() and isinstance(body, str) and body.startswith("{"):
                      # actually keep probing — the variants give different data
                      pass
          PYEOF
