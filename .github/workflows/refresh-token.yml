name: Refresh Apple Search Ads Token

on:
  schedule:
    # GitHub Actions deprioritizes scheduled runs at top-of-hour
    # (xx:00 and xx:30) during peak load. Use off-peak minutes
    # (xx:07 and xx:37) — Actions docs explicitly recommend this
    # to reduce skipped/delayed runs.
    - cron: "7,37 * * * *"
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run token refresher
        env:
          CLIENT_ID: ${{ secrets.ASA_CLIENT_ID }}
          TEAM_ID: ${{ secrets.ASA_TEAM_ID }}
          KEY_ID: ${{ secrets.ASA_KEY_ID }}
          PRIVATE_KEY_PEM: ${{ secrets.ASA_PRIVATE_KEY_PEM }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_PATH: ${{ secrets.FTP_PATH }}
        run: python3 refresh_token.py
