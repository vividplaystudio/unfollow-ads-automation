name: Probe RC charts revenue (full body + per-day daily fetch)

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe charts/revenue full body + per-day
        env:
          REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
          REVENUECAT_PROJECT_ID: ${{ secrets.REVENUECAT_PROJECT_ID }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request
          api_key = os.environ["REVENUECAT_API_KEY"]
          project_id = os.environ.get("REVENUECAT_PROJECT_ID", "6afc72a9")

          def get(url):
              req = urllib.request.Request(url, headers={"Authorization": f"Bearer {api_key}"})
              with urllib.request.urlopen(req, timeout=15) as r:
                  return json.loads(r.read().decode())

          # 1) Full charts/revenue body
          base = f"https://api.revenuecat.com/v2/projects/{project_id}/charts/revenue"
          for q in [
              "",
              "?start_date=2026-05-25&end_date=2026-06-23",
              "?start_date=2026-05-25&end_date=2026-06-23&resolution=day",
              "?period=last_30_days",
          ]:
              try:
                  data = get(base + q)
                  print(f"\n=== {base + q} ===")
                  print(json.dumps(data, indent=2)[:3000])
              except Exception as e:
                  print(f"❌ {q}: {e}")

          # 2) Try metrics/revenue per-day
          print("\n=== Per-day metrics/revenue ===")
          from datetime import datetime, timezone, timedelta
          today = datetime.now(timezone.utc).date()
          for i in [1, 2, 7, 14, 30]:
              d = (today - timedelta(days=i)).isoformat()
              url = f"https://api.revenuecat.com/v2/projects/{project_id}/metrics/revenue?start_date={d}&end_date={d}"
              try:
                  r = get(url)
                  print(f"  {d}: ${r.get('value', 0):.2f}")
              except Exception as e:
                  print(f"  {d}: ERR {e}")
          PYEOF
